name: Main CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  aletheia_stats_module_checks:
    name: Aletheia-Stats Module Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Verify required files exist
        run: |
          echo "Checking required files..."
          test -f aletheia_stats/requirements.txt || { echo "❌ requirements.txt not found"; exit 1; }
          test -f aletheia_stats/docker-compose.yml || { echo "❌ docker-compose.yml not found"; exit 1; }
          test -f aletheia_stats/scripts/init_db.py || { echo "❌ init_db.py not found"; exit 1; }
          echo "✅ All required files found"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit pytest pytest-cov coverage
          # Install main dependencies
          pip install -r aletheia_stats/requirements.txt
          # Install dev dependencies if they exist
          if [ -f aletheia_stats/requirements-dev.txt ]; then
            pip install -r aletheia_stats/requirements-dev.txt
          fi

      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Clean up any existing Docker resources
        run: |
          echo "Cleaning up existing Docker resources..."
          cd aletheia_stats
          docker-compose down -v --remove-orphans 2>/dev/null || true
          docker system prune -f --volumes 2>/dev/null || true

      - name: Start services for integration tests
        working-directory: ./aletheia_stats
        run: |
          echo "Starting services..."
          docker-compose -f docker-compose.yml up --build -d db mlflow
          echo "Services started"

      - name: Wait for PostgreSQL to be healthy
        working-directory: ./aletheia_stats
        run: |
          echo "Waiting for PostgreSQL to be healthy..."
          timeout_seconds=180
          start_time=$(date +%s)

          while true; do
            current_time=$(date +%s)
            if [ $((current_time - start_time)) -ge $timeout_seconds ]; then
              echo "❌ Timeout waiting for PostgreSQL."
              docker-compose logs db
              exit 1
            fi

            # Check if container is running and healthy
            if docker-compose ps db | grep -q 'Up.*healthy'; then
              echo "✅ PostgreSQL is healthy."
              break
            fi

            # Alternative check: try to connect directly
            if docker-compose exec -T db pg_isready -U user -d aletheia_stats_db >/dev/null 2>&1; then
              echo "✅ PostgreSQL is ready."
              break
            fi

            echo -n "."
            sleep 5
          done

          docker-compose ps

      - name: Wait for MLflow to be ready
        working-directory: ./aletheia_stats
        run: |
          echo "Waiting for MLflow service to be available..."
          timeout_seconds=120
          start_time=$(date +%s)

          while true; do
            current_time=$(date +%s)
            if [ $((current_time - start_time)) -ge $timeout_seconds ]; then
              echo "❌ Timeout waiting for MLflow."
              docker-compose logs mlflow
              exit 1
            fi

            # Check if MLflow responds
            if curl -f -s http://localhost:5001/health >/dev/null 2>&1; then
              echo "✅ MLflow health endpoint is responding."
              break
            fi

            # Fallback check
            if curl -f -s http://localhost:5001 >/dev/null 2>&1; then
              echo "✅ MLflow service is responding."
              break
            fi

            echo -n "."
            sleep 3
          done

      - name: Apply database migrations
        working-directory: ./aletheia_stats
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/aletheia_stats_db"
          MLFLOW_TRACKING_URI: "http://localhost:5001"
        run: |
          echo "Applying database migrations..."
          python scripts/init_db.py
          echo "✅ Database migrations applied"

      - name: Run tests
        working-directory: ./aletheia_stats
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/aletheia_stats_db"
          MLFLOW_TRACKING_URI: "http://localhost:5001"
          JWT_SECRET_KEY: "test-ci-secret-key"
          RANDOM_SEED: "42"
          LOG_LEVEL: "DEBUG"
          APP_ENVIRONMENT: "test_ci"
        run: |
          echo "Running tests..."
          pytest tests/ \
            --cov=aletheia_stats \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-report=html \
            -v \
            --tb=short \
            --strict-markers \
            --disable-warnings

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./aletheia_stats/coverage.xml # Path relative to repo root
          name: codecov-aletheia_stats-module
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            aletheia_stats/coverage.xml
            aletheia_stats/htmlcov/
          retention-days: 30

      - name: Display test summary
        if: always()
        run: |
          echo "=== TEST SUMMARY ==="
          if [ -f aletheia_stats/coverage.xml ]; then
            echo "✅ Coverage report generated"
          else
            echo "❌ Coverage report not found"
          fi

      - name: Stop services
        if: always()
        working-directory: ./aletheia_stats
        run: |
          echo "Stopping services..."
          docker-compose down -v --remove-orphans
          echo "✅ Services stopped"

      - name: Cleanup Docker resources
        if: always()
        run: |
          echo "Final cleanup..."
          docker system prune -f --volumes 2>/dev/null || true
          echo "✅ Cleanup completed"
```
