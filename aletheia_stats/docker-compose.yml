version: '3.8'

services:
  # Aletheia-Stats API Service
  api:
    build:
      context: . # Build from the current directory (aletheia_stats/)
      dockerfile: Dockerfile
    container_name: aletheia_stats_api
    # If you need to mount the current directory for live code reloading during development:
    # volumes:
    #   - .:/app # Mounts the content of aletheia_stats/ to /app in the container
    ports:
      # Exposes port (default 8001) of the container to a host port (default 8001).
      # Format: "HOST_PORT:CONTAINER_PORT"
      - "${STATS_API_PORT_HOST:-8001}:${STATS_API_PORT:-8001}"
    environment:
      # Variables expected by aletheia_stats/aletheia_stats/main.py and infrastructure modules
      - STATS_DATABASE_URL=${STATS_DATABASE_URL:-postgresql://user:pass@db:5432/aletheia_stats_db}
      - STATS_MLFLOW_TRACKING_URI=${STATS_MLFLOW_TRACKING_URI:-http://mlflow:5001} # MLflow server runs on 5001
      - JWT_SECRET_KEY=${STATS_JWT_SECRET_KEY:-default-super-secret-key-for-stats} # Specific secret key
      - JWT_ALGORITHM=${STATS_JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${STATS_JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - RANDOM_SEED=${STATS_RANDOM_SEED:-42}
      - APP_LOG_LEVEL=${STATS_APP_LOG_LEVEL:-INFO} # For application's own logging
      - STATS_API_HOST=${STATS_API_HOST:-0.0.0.0} # For Uvicorn in main.py
      - STATS_API_PORT=${STATS_API_PORT:-8001} # For Uvicorn in main.py
      - STATS_LOG_LEVEL_UVICORN=${STATS_LOG_LEVEL_UVICORN:-info} # For Uvicorn's logging
      - APP_ENVIRONMENT=${STATS_APP_ENVIRONMENT:-development}
      # OAUTH2_SCHEME_TOKEN_URL for aletheia_common, specific to aletheia_stats's own token endpoint
      - OAUTH2_SCHEME_TOKEN_URL=${STATS_OAUTH2_SCHEME_TOKEN_URL:-/api/v1/token}
    depends_on:
      db:
        condition: service_healthy # Wait for DB to be healthy
      mlflow:
        condition: service_started # Wait for MLflow to start (basic check)
    networks:
      - aletheia_stats_network
    restart: unless-stopped # Or 'always', 'on-failure'

  # PostgreSQL Database Service
  db:
    image: postgres:14-alpine # Using alpine for a smaller image
    container_name: aletheia_stats_db
    environment:
      - POSTGRES_USER=${DB_USER:-user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-pass}
      - POSTGRES_DB=${DB_NAME:-aletheia_stats_db}
    volumes:
      # Persists database data across container restarts.
      # Creates a named volume 'aletheia_stats_postgres_data'.
      - aletheia_stats_postgres_data:/var/lib/postgresql/data
    ports:
      # Exposes PostgreSQL port 5432 to the host.
      # Change host port if 5432 is already in use.
      - "${DB_PORT_HOST:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-aletheia_stats_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aletheia_stats_network
    restart: unless-stopped

  # MLflow Tracking Server Service
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.7.1 # Use a specific version
    container_name: aletheia_stats_mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5001
      --backend-store-uri ${MLFLOW_BACKEND_STORE_URI:-postgresql://user:pass@db:5432/aletheia_stats_mlflow_backend}
      --default-artifact-root ${MLFLOW_DEFAULT_ARTIFACT_ROOT:-./mlartifacts}
      # For --default-artifact-root, if using a volume, ensure it's writable.
      # Or use S3 compatible storage like MinIO.
      # For this example, using a local path inside the container (can be mounted).
    ports:
      # Exposes MLflow UI port 5001 to the host.
      # Change host port if 5001 is already in use.
      - "${MLFLOW_PORT_HOST:-5001}:5001"
    volumes:
      - aletheia_stats_mlflow_data:/app/mlartifacts # Persist artifacts
    depends_on:
      db:
        condition: service_healthy # MLflow can use the same DB for its backend
    networks:
      - aletheia_stats_network
    restart: unless-stopped

  alembic_migrate:
    build:
      context: .
      dockerfile: Dockerfile # Uses the same image as API
    container_name: aletheia_stats_alembic_migrate
    command: >
      sh -c "
        echo 'Aletheia-Stats Migrator: Waiting for DB (db:5432) to be ready...' &&
        until pg_isready -h db -p 5432 -U ${DB_USER:-user} -d ${DB_NAME:-aletheia_stats_db}; do
          sleep 2;
        done;
        echo 'Aletheia-Stats Migrator: DB is ready. Running Alembic migrations...' &&
        alembic -c /app/alembic.ini upgrade head
      "
    environment:
      # This service needs STATS_DATABASE_URL for alembic's env.py to pick up
      - STATS_DATABASE_URL=${STATS_DATABASE_URL:-postgresql://${DB_USER:-user}:${DB_PASSWORD:-pass}@db:5432/${DB_NAME:-aletheia_stats_db}}
      # Pass other DB variables if alembic.ini or env.py uses them indirectly via config.get_main_option
      - DB_USER=${DB_USER:-user}
      - DB_PASSWORD=${DB_PASSWORD:-pass}
      - DB_NAME=${DB_NAME:-aletheia_stats_db}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aletheia_stats_network
    restart: 'no' # This job should run once and exit

# Networks definition
networks:
  aletheia_stats_network:
    driver: bridge # Default driver

# Volumes definition
volumes:
  aletheia_stats_postgres_data: # For PostgreSQL data
  aletheia_stats_mlflow_data:   # For MLflow artifacts and data (if not using external storage)
