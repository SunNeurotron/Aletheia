# A generic Alembic configuration file.
# Refer to the Alembic documentation for more information.
# https://alembic.sqlalchemy.org/en/latest/startup.html

[alembic]
# path to migration scripts
script_location = alembic

# template for migration file names, e.g. "%%(rev)s_%%(slug)s.py"
# (this is the default if not specified)
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
# prepend_sys_path = .

# timezone for migration names (e.g. "UTC")
# default is the system timezone
# timezone =

# sqlalchemy.url
#   This is the URL of the database to connect to.
#   The DATABASE_URL environment variable will override this if `env.py` is configured to use it.
#   The init_db.py script also overrides this programmatically.
sqlalchemy.url = postgresql://user:pass@localhost/aletheia_stats_db_placeholder

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# Revision generation options
# Set to true if you want Alembic to try to auto-generate new revision files
# when you run "alembic revision -m <message> --autogenerate"
# revision_environment = false

# Set to true if you want Alembic to try to generate multiple files
# for autogenerate, when multiple databases are configured in env.py
# generate_multiple = false

# Options for 'alembic revision --autogenerate'
#
# By default, autogenerate detects:
#   * Table additions, removals.
#   * Column additions, removals.
#   * Change of nullable status on columns.
#   * Basic changes in indexes and unique constraints.
#
# Autogenerate does not detect:
#   * Changes of table name.
#   * Changes of column name.
#   * Anonymous naming schemes.
#   * Server default changes.
#   * Type changes on columns (unless you enable compare_type=True below)
#
# To enable type comparison, set this to true.
# compare_type = true

# To enable server default comparison, set this to true.
# compare_server_default = true

# To enable rendering of batch mode operations, set this to true.
# render_as_batch = false

# Other options:
# include_object = alembic.util.callable
# process_revision_directives = alembic.util.callable
# render_item = alembic.util.callable
# sourceless = false
# output_encoding = utf-8
# sqlalchemy_module_prefix = sqlalchemy.
# migration_context_custom_kwargs = {}
