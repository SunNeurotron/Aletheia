apiVersion: apps/v1
kind: Deployment # Could be a StatefulSet if workers need stable identities or persistent storage per replica
metadata:
  name: aletheia-worker-deployment
  labels:
    app: aletheia
    service: worker
spec:
  replicas: 3 # Example: start with 3 Celery worker replicas
  selector:
    matchLabels:
      app: aletheia
      service: worker
  template:
    metadata:
      labels:
        app: aletheia
        service: worker
    spec:
      containers:
      - name: aletheia-worker
        image: your-docker-registry/aletheia-platform:latest # Replace with your actual image path
        # entrypoint.sh will receive these arguments
        args:
        - "celery"
        - "-A"
        - "Aletheia_v3.infrastructure.celery_worker.celery_app"
        - "worker"
        - "-l"
        - "info"
        - "-Q"
        - "math_heavy,default" # Explicitly consume from math_heavy and default queues
        - "-P"
        - "eventlet" # Concurrency pool
        - "-c"
        - "2" # Example concurrency per worker pod
        envFrom:
        - configMapRef:
            name: aletheia-configmap
        - secretRef:
            name: aletheia-secrets
        env:
        - name: C_FORCE_ROOT # Often needed for Celery in Docker
          value: "true"
        resources:
          requests:
            memory: "512Mi" # Workers might need more memory
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1"
        livenessProbe: # Basic liveness probe for Celery
          exec:
            command:
            - celery
            - "-A"
            - "Aletheia_v3.infrastructure.celery_worker.celery_app"
            - "status"
          initialDelaySeconds: 60 # Give time for worker to start and connect
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        # Readiness probe could check connection to Redis, or a custom health check if implemented
        # readinessProbe:
        #   exec:
        #     command: ["redis-cli", "-h", "$(REDIS_HOST)", "-p", "$(REDIS_PORT)", "ping"]
        #   initialDelaySeconds: 20
        #   periodSeconds: 15
      # imagePullSecrets:
      # - name: your-registry-secret
