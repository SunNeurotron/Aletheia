# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template for migration file names, e.g. "%%(rev)s_%%(slug)s.py"
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
# prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python-dateutil library that can be
# installed with:
# pip install python-dateutil
# Default: <no timezone set>
# timezone =

# sqlalchemy.url = driver://user:pass@localhost/dbname
#
# This value is typically NOT USED directly if the alembic/env.py script
# is configured to read the database URL from an environment variable
# (e.g., ALETHEIA_V3_DATABASE_URL or DATABASE_URL), which is best practice.
# The line below is a placeholder and will likely be ignored if env.py is correctly set up.
# Refer to your alembic/env.py to see how `sqlalchemy.url` is truly configured for migrations.
sqlalchemy.url = postgresql://placeholder_user:placeholder_pass@placeholder_host/placeholder_db

# Semicolon-separated list of revision branches to display with "branches"
# command.
# Default: <all branches>
# branches =

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# to be template arguments.
# python_include_main = false

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %%(levelname)-5.5s [%%(name)s] %%(message)s
datefmt = %%H:%%M:%%S
