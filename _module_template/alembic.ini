# Alembic configuration file para [Module Name]
# (Copia y adapta el alembic.ini de aletheia_stats/alembic.ini)

[alembic]
script_location = alembic
# sqlalchemy.url se tomará de la variable de entorno MODULE_DATABASE_URL
# o se configurará programáticamente en env.py o init_db.py.
# sqlalchemy.url = postgresql://user:pass@localhost/module_db_placeholder

# ... (resto de la configuración de logging, etc., similar a aletheia_stats/alembic.ini) ...

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
