# aletheia_omega/alembic.ini
# Contenido basado en la propuesta, adaptado para usar variable de entorno

[alembic]
# path to migration scripts
script_location = alembic

# Comma-separated list of supported database dialects
# dialects = postgresql, mysql, sqlite
# dialects = postgresql

# Template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone in which migration files are generated
# timezone = UTC

# sys.path path, will be prepended to sys.path if present.
# applicable if use_python_path = true
# python_path = .

# True if a project's root directory should be added to sys.path.
# use_python_path = false

# sqlalchemy.url = driver://user:pass@localhost/dbname
# La URL se tomará de la variable de entorno ALETHEIA_OMEGA_DATABASE_URL via env.py
# Se puede dejar un valor por defecto aquí si se desea, pero env.py lo sobreescribirá.
sqlalchemy.url = postgresql://user:pass@db_host_placeholder/aletheia_db_omega_placeholder

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
# Ajustado para que %%(message)s sea el último para evitar problemas con % en mensajes de log
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
